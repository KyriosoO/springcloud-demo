server:
    port: 9888
eureka:
    client:
        service-url:
            defaultZone: http://localhost:8761/eureka/
        register-with-eureka: true
        fetch-registry: true
    instance:
        prefer-ip-address: true # 注册为 IP，避免 hostname 解析错误
        lease-renewal-interval-in-seconds: 5 # 心跳间隔
        lease-expiration-duration-in-seconds: 15 # 服务过期时间
spring:
    application:
        name: configserver
    profiles:
        active: native
    cloud:
        config:
            server:
                native:
                    search-locations: classpath:/config
                # 不加 git 配置，不会去校验
