eureka:
    client:
        service-url:
            defaultZone: http://localhost:8761/eureka/
        register-with-eureka: true
        fetch-registry: true
    instance:
        ip-address: localhost
        prefer-ip-address: true # 注册为 IP，避免 hostname 解析错误
        lease-renewal-interval-in-seconds: 5 # 心跳间隔
        lease-expiration-duration-in-seconds: 15 # 服务过期时间

server:
    port: 8090
spring:
    cloud:
        config:
            enabled: false
    application:
        name: authcenter
    jackson:
        serialization:
            indent-output: true
logging:
    level:
        "[org.springframework.security]": INFO
