eureka:
    client:
        service-url:
            defaultZone: http://localhost:8761/eureka/
        register-with-eureka: true
        fetch-registry: true
    instance:
        prefer-ip-address: true # 注册为 IP，避免 hostname 解析错误
        lease-renewal-interval-in-seconds: 5 # 心跳间隔
        lease-expiration-duration-in-seconds: 15 # 服务过期时间
server:
    port: 8082
spring:
    application:
        name: mqprocedureserver
    config:
        import: optional:configserver:http://localhost:9888
rocketmq:
    name-server: localhost:9876 # 替换成你RocketMQ NameServer地址
    producer:
        group: order-producer-group
    consumer:
        group: order-consumer-group

# 可选：消费模式，默认是集群模式
# message-model: BROADCASTING
