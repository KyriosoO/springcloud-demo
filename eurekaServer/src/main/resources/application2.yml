server:
    port: 8761
eureka:
    server:
        enable-self-preservation: false
    instance:
        preferIpAddress: true #是否使用 IP 地址 作为服务注册时的标识。
        hostname: ${spring.cloud.client.ip-address} #用于手动指定服务实例在 Eureka 中注册时使用的主机名。
        instanceId: ${spring.cloud.client.ip-address}:${server.port} #用于指定该服务实例在 Eureka 注册时使用的 唯一标识符
    client:
        registerWithEureka: false
        fetchRegistry: false
        serviceUrl:
            defaultZone: http://localhost:8761/eureka/